name: Build Home Manager Configurations

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  homes:
    name: Enumerate homes
    runs-on: ubuntu-latest

    outputs:
      homes: ${{ steps.homes.outputs.homes }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3

      - name: Set up SSH key
        env:
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        run: |
          if [ -z "${SSH_DEPLOY_KEY:-}" ]; then
            echo "SSH_DEPLOY_KEY is required to fetch private flake inputs."
            exit 1
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Enumerate Home Manager outputs
        id: homes
        run: |
          homes="$(nix eval --json '.#homeConfigurations' --apply builtins.attrNames)"
          echo "homes=$homes" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.home }}
    needs: homes
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        home: ${{ fromJSON(needs.homes.outputs.homes) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          diff-store: true

      - name: Set up SSH key
        env:
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        run: |
          if [ -z "${SSH_DEPLOY_KEY:-}" ]; then
            echo "SSH_DEPLOY_KEY is required to fetch private flake inputs."
            exit 1
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Build Home Manager configuration
        env:
          HOME_CONFIGURATION: ${{ matrix.home }}
        run: |
          nix build --print-build-logs --no-link \
            ".#homeConfigurations.${HOME_CONFIGURATION}.activationPackage"
